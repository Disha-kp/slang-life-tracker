name: Auto-Update Slang Database

on:
  schedule:
    # Runs daily at 06:00 UTC. Edit the cron expression to change frequency
    # (e.g. '0 */12 * * *' for every 12 hours).
    - cron: '0 6 * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit & push changes

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run auto updater
        id: run_updater
        run: |
          python data/auto_updater.py

      - name: Check for changes
        id: git_check
        run: |
          if [ -n "$(git status --porcelain data/slang_master_2026.csv data/mentions_history.csv)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push new slang entries
        if: steps.git_check.outputs.changed == 'true'
        run: |
          git config user.name "slang-auto-updater[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add data/slang_master_2026.csv data/mentions_history.csv
          git commit -m "chore: auto-update slang database $(date -u +'%Y-%m-%d')"
          git push

      - name: No new words found
        if: steps.git_check.outputs.changed == 'false'
        run: echo "No new slang words discovered this run — nothing to commit."
